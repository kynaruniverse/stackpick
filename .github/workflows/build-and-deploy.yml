name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Prevent concurrent deploys — if a new push happens while a deploy
# is in progress, cancel the in-progress run and start fresh.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Validate & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Run validation independently so errors surface with a clear label
      - name: Validate data
        run: node _generator/lib/validate.js

      - name: Build site
        run: npm run build

      # Upload the full built site as an artifact so the deploy job
      # doesn't need to rebuild — and so you can download any build.
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ github.sha }}
          path: |
            .
            !_generator/
            !_data/
            !_templates/
            !node_modules/
            !.git/
            !.github/
          retention-days: 7

  # ── Deploy (only on push to main, not on PRs) ──────────────────────────────
  deploy:
    name: Deploy to Netlify
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site-${{ github.sha }}
          path: ./dist

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2
        with:
          publish-dir: './dist'
          production-branch: main
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions — ${{ github.sha }}"
          enable-pull-request-comment: true
          enable-commit-comment: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

  # ── Lighthouse CI (optional, runs on PRs only) ─────────────────────────────
  # Uncomment this job once you have @lhci/cli installed and configured.
  # It checks Core Web Vitals before merging PRs.
