<div class="product-card" data-category="{{category}}">
  <div class="product-image-placeholder" aria-hidden="true" style="color: var(--cat-seam);">
    {{emoji}}
  </div>

  <div class="product-content">
    <span class="product-badge" {{#if badgeColor}}style="background-color: {{badgeColor}}; color: #fff;"{{/if}}>
      {{badge}}
    </span>

    <h3 class="product-title">{{name}}</h3>

    <div class="product-price-block">
      <div class="price-info">
        <span class="price-current-label">Current Price</span>
        <span class="price-current">{{price}}</span>
      </div>
      
      {{#if msrp}}
      <div class="price-rrp-wrap">
        <span class="price-rrp-label">RRP</span>
        <span class="price-rrp">{{msrp}}</span>
      </div>
      <span class="price-saving">{{savings}} OFF</span>
      {{/if}}
    </div>

    <div class="product-specs">
      {{#each specs}}
      <span class="spec-tag">{{this}}</span>
      {{/each}}
    </div>

    <p class="product-desc">{{desc}}</p>

    <ul class="product-features">
      {{#each pros}}
      <li class="pro"><span class="pro-icon" aria-hidden="true">✓</span><strong>PRO:</strong> {{this}}</li>
      {{/each}}
      {{#each cons}}
      <li class="con"><span class="con-icon" aria-hidden="true">✕</span><strong>CON:</strong> {{this}}</li>
      {{/each}}
    </ul>

    <a href="{{affiliate}}" target="_blank" rel="noopener sponsored" class="product-btn">
      Check Price
    </a>
  </div>
</div>
