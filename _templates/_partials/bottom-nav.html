<script>
  // 1. Highlight Active Nav Item
  const currentPath = window.location.pathname;
  document.querySelectorAll('.bottom-nav-link').forEach(link => {
    if (link.getAttribute('href') === currentPath || link.dataset.navPath === currentPath) {
      link.classList.add('active');
    }
  });

  // 2. Price Badge Injection (Optimized)
  document.querySelectorAll('.price-current:not(:has(.price-badge))').forEach(el => {
    const badge = document.createElement('span');
    badge.className = 'price-badge';
    badge.textContent = 'Feb 2026';
    el.appendChild(badge);
  });
</script>
