<!DOCTYPE html>
<html lang="en-GB" data-theme="dark"> <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  
  <script>
    (function() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      document.documentElement.setAttribute('data-theme', savedTheme);
    })();
  </script>

  <meta name="theme-color" content="#F2F0EB" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0A0A0F" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="StackPick">

  <title>{{pageTitle}}</title>
  <meta name="description" content="{{metaDescription}}">
  <meta name="author" content="Stack Pick">
  <link rel="canonical" href="{{canonical}}">

  <meta property="og:type" content="{{ogType}}">
  <meta property="og:url" content="{{canonical}}">
  <meta property="og:title" content="{{ogTitle}}">
  <meta property="og:description" content="{{ogDescription}}">
  <meta property="og:image" content="https://stackpick.co.uk/assets/images/og-image.jpg">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ogTitle}}">
  <meta name="twitter:description" content="{{ogDescription}}">
  <meta name="twitter:image" content="https://stackpick.co.uk/assets/images/og-image.jpg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>{{emoji}}</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/assets/icons/icon-192.png">

  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Outfit:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/wall-tokens.css">
  <link rel="stylesheet" href="/assets/css/style.css">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZTN7H3L6DV"></script>
  <script src="/assets/js/analytics.js"></script>
  {{{schemaJSON}}}
</head>
