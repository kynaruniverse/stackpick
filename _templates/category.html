<!DOCTYPE html>
<html lang="en-GB" data-theme="dark">
<head>
  {{> head}}
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  {{> header}}

  <section class="hero hero--inner">
    <div class="scan-beam"></div>
    <div class="hero__container">
      <p class="hero__eyebrow">Hardware Category</p>
      <h1 class="hero__title">{{heroTitle}}</h1>
      <p class="hero__desc">{{heroSubtitle}}</p>
    </div>
  </section>

  <div class="breadcrumb-bar">
    <div class="container">
      <ol class="breadcrumb-list" aria-label="Breadcrumb">
        <li><a href="/">Home</a></li>
        <li aria-hidden="true" class="breadcrumb-sep">/</li>
        <li aria-current="page">{{breadcrumbLabel}}</li>
      </ol>
    </div>
  </div>

  <div class="page-wrapper container">

    {{> sidebar}}

    <main class="main-content" id="main-content">

      <div class="card-grid card-grid--list" id="product-list" aria-label="{{breadcrumbLabel}} picks">
        {{productCardsHTML}}
      </div>

      <section class="buying-guide-section">
        <div class="section-head">
          <span class="section-head__label">Knowledge Base</span>
          <h2 class="section-head__title">What to Look For</h2>
        </div>
        <div class="buying-guide-content">
          {{buyingGuideHTML}}
        </div>
      </section>

    </main>
  </div>

  {{> footer}}
  {{> bottom-nav}}

  <script src="/assets/js/shared.js" defer></script>
  <script src="/assets/js/app.js" defer></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>

</body>
</html>
