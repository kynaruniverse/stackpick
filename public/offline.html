<!DOCTYPE html>
<html lang="en-GB" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1B3022" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0F0F0F" media="(prefers-color-scheme: dark)">
  <meta name="robots" content="noindex">
  <title>You're offline — StackPick</title>

  <!-- Favicon — inline SVG, no network request -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231B3022'/><text y='72' x='50' text-anchor='middle' font-size='60' font-family='system-ui' font-weight='900' fill='%23D95433'>S</text></svg>">

  <!--
    Fonts: Syne (display) + Inter (body) + JetBrains Mono
    Same stack as the live site. Cached by the service worker.
    Falls back to system-ui if network is unavailable.
  -->
  <!--
    OFFLINE-PAGE SELF-CONTAINMENT NOTE:
    This page must work with zero network access. Rules:
    - All CSS is inline (<style> block below) — no external .css files
    - All JS is inline (<script> block at bottom) — no external .js files
    - The favicon is an inline data: URI — no network request
    - Google Fonts <link> tags below will silently fail offline; the stack
      falls back to system-ui/monospace via CSS font-family fallbacks. This
      is intentional and correct — do NOT remove the fallback fonts from CSS.
    - The cached-list JS reads from the real SW cache when available, and
      falls back to the hardcoded <li> links when caches API is unavailable.
    Do NOT add <link rel="stylesheet">, <script src="">, or <img src=""> tags
    that point to external files — they will break this page when truly offline.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">

  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    /* ── Self-contained tokens — inline so page works with no network ──
       Colors match the tokens.css palette exactly.
       Light theme is the default (matches Base.astro). */
    :root {
      --bg:           #F7F7F8;
      --bg-surface:   #FFFFFF;
      --text:         #0D0D0D;
      --text-muted:   #71717A;
      --brand:        #1B3022;
      --action:       #D95433;
      --action-hover: #B8421F;
      --action-subtle:rgba(217, 84, 51, 0.08);
      --action-dim:   rgba(217, 84, 51, 0.25);
      --border:       #E4E4E7;
      --border-strong:#A1A1AA;
      --font-display: 'Syne', system-ui, sans-serif;
      --font-body:    'Inter', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
      --radius:       8px;
      --radius-pill:  100px;
    }

    [data-theme="dark"] {
      --bg:           #0F0F0F;
      --bg-surface:   #1A1A1A;
      --text:         #F0F0F0;
      --text-muted:   #71717A;
      --brand:        #2D5240;
      --action:       #E8613D;
      --border:       #27272A;
      --border-strong:#3F3F46;
    }

    [data-theme="earth"] {
      --bg:           #F0EBE3;
      --bg-surface:   #FBF8F4;
      --text:         #1C1917;
      --text-muted:   #78716C;
      --border:       #D6CFC6;
      --border-strong:#A8A29E;
    }

    /* ── Base ── */
    html { height: 100%; -webkit-text-size-adjust: 100%; }

    body {
      min-height: 100%;
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.5rem;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Icon ── */
    .offline-icon {
      font-size: 3.5rem;
      line-height: 1;
      margin-bottom: 1.5rem;
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Eyebrow ── */
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--action);
      margin-bottom: 0.75rem;
    }

    .eyebrow::before {
      content: '';
      display: block;
      width: 16px;
      height: 1.5px;
      background: var(--action);
    }

    /* ── Heading ── */
    h1 {
      font-family: var(--font-display);
      font-size: clamp(1.75rem, 6vw, 2.5rem);
      font-weight: 800;
      color: var(--text);
      line-height: 1.1;
      letter-spacing: -0.03em;
      margin-bottom: 0.75rem;
    }

    h1 em {
      font-style: normal;
      color: var(--action);
    }

    /* ── Subtext ── */
    .sub {
      font-size: 0.9375rem;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 340px;
      margin: 0 auto 2rem;
    }

    /* ── Status bar ── */
    .status-bar {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: var(--text-muted);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-pill);
      padding: 0.375rem 0.875rem;
      margin-bottom: 2rem;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #ef4444;
      flex-shrink: 0;
      animation: blink 1.5s ease-in-out infinite;
    }

    .status-dot--online {
      background: #22c55e;
      animation: none;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }

    /* ── Buttons ── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      width: 100%;
      max-width: 280px;
    }

    .btn-primary {
      display: block;
      width: 100%;
      padding: 0.8125rem 1.5rem;
      background: var(--action);
      color: #ffffff;
      font-family: var(--font-display);
      font-size: 0.8125rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: background 0.18s ease, transform 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-primary:hover {
      background: var(--action-hover);
      transform: translateY(-1px);
    }

    .btn-primary:active { transform: translateY(0); }

    .btn-secondary {
      display: block;
      width: 100%;
      padding: 0.8125rem 1.5rem;
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-body);
      font-size: 0.8125rem;
      font-weight: 500;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      text-decoration: none;
      transition: border-color 0.18s ease, color 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .btn-secondary:hover {
      border-color: var(--action-dim);
      color: var(--text);
    }

    /* ── Divider ── */
    .divider {
      width: 100%;
      max-width: 360px;
      height: 1px;
      background: var(--border);
      margin: 2.5rem 0;
    }

    /* ── Cached pages list ── */
    .cached-section {
      width: 100%;
      max-width: 360px;
      text-align: left;
    }

    .cached-label {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.75rem;
    }

    .cached-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
    }

    .cached-list a {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      padding: 0.625rem 0.875rem;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: border-color 0.18s ease, background 0.18s ease;
      -webkit-tap-highlight-color: transparent;
    }

    .cached-list a:hover {
      border-color: var(--action-dim);
      background: var(--action-subtle);
    }

    .cached-list .icon {
      font-size: 1rem;
      flex-shrink: 0;
    }

    /* ── Logo ── */
    .logo {
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      margin-top: 0.5rem;
    }

    .logo span { color: var(--action); }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .offline-icon, .status-dot { animation: none; }
      .btn-primary, .btn-secondary, .cached-list a { transition: none; }
    }
  </style>
</head>
<body>

  <div class="offline-icon" aria-hidden="true">📡</div>

  <p class="eyebrow">No Connection</p>
  <h1>You're <em>offline</em><br>right now</h1>
  <p class="sub">No internet connection detected. Check your signal and try again — or browse what's already cached below.</p>

  <div class="status-bar" id="status-bar" role="status" aria-live="polite">
    <span class="status-dot" id="status-dot"></span>
    <span id="status-text">No internet connection</span>
  </div>

  <div class="actions">
    <button class="btn-primary" id="retry-btn">Try again</button>
    <a href="/" class="btn-secondary">Back to home</a>
  </div>

  <div class="divider"></div>

  <div class="cached-section">
    <p class="cached-label">Available offline</p>
    <ul class="cached-list" id="cached-list">
      <!-- Static fallback — JS replaces with real cache contents -->
      <li><a href="/headsets/"><span class="icon">🎧</span>Headsets</a></li>
      <li><a href="/keyboards/"><span class="icon">⌨️</span>Keyboards</a></li>
      <li><a href="/mice/"><span class="icon">🖱️</span>Mice</a></li>
      <li><a href="/monitors/"><span class="icon">🖥️</span>Monitors</a></li>
      <li><a href="/chairs/"><span class="icon">🪑</span>Chairs</a></li>
    </ul>
  </div>

  <div class="divider"></div>

  <a href="/" class="logo">STACK<span>·</span>PICK</a>

  <script>
  (function () {
    'use strict';

    // ── Apply saved theme ─────────────────────────────────────────────────
    // Mirrors the inline script in Base.astro — keeps the offline page
    // consistent with whatever theme the user has selected.
    try {
      var saved = localStorage.getItem('sp-theme');
      var valid = ['light', 'dark', 'earth'];
      if (saved && valid.indexOf(saved) !== -1) {
        document.documentElement.setAttribute('data-theme', saved);
      } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    } catch (e) { /* localStorage blocked — light default stays */ }


    // ── Retry button ──────────────────────────────────────────────────────
    document.getElementById('retry-btn').addEventListener('click', function () {
      window.location.reload();
    });


    // ── Populate cached list from real SW cache ───────────────────────────
    if ('caches' in window) {
      var PAGE_ICONS = {
        '/':             { icon: '🏠', label: 'Home' },
        '/mice/':        { icon: '🖱️', label: 'Mice' },
        '/keyboards/':   { icon: '⌨️', label: 'Keyboards' },
        '/headsets/':    { icon: '🎧', label: 'Headsets' },
        '/monitors/':    { icon: '🖥️', label: 'Monitors' },
        '/chairs/':      { icon: '🪑', label: 'Chairs' },
        '/guides/':      { icon: '📋', label: 'Setup Guides' },
        '/comparisons/': { icon: '📊', label: 'Comparisons' },
        '/search/':      { icon: '🔍', label: 'Search' },
        '/about/':       { icon: 'ℹ️',  label: 'About' },
      };

      caches.keys().then(function (cacheNames) {
        return Promise.all(cacheNames.map(function (name) {
          return caches.open(name).then(function (cache) {
            return cache.keys();
          });
        }));
      }).then(function (keyArrays) {
        var allKeys = [].concat.apply([], keyArrays);
        var cachedPaths = allKeys.map(function (req) {
          try { return new URL(req.url).pathname; }
          catch (e) { return null; }
        }).filter(function (p) { return p && PAGE_ICONS[p]; });

        var seen = {};
        var unique = Object.keys(PAGE_ICONS).filter(function (p) {
          return cachedPaths.indexOf(p) !== -1 && !seen[p] && (seen[p] = true);
        });

        if (!unique.length) return;

        var list = document.getElementById('cached-list');
        list.innerHTML = unique.map(function (p) {
          var meta = PAGE_ICONS[p];
          return '<li><a href="' + p + '"><span class="icon">' + meta.icon + '</span>' + meta.label + '</a></li>';
        }).join('');

      }).catch(function () { /* keep static fallback */ });
    }


    // ── Connection restored ───────────────────────────────────────────────
    window.addEventListener('online', function () {
      var dot  = document.getElementById('status-dot');
      var text = document.getElementById('status-text');
      var btn  = document.getElementById('retry-btn');

      if (dot)  dot.classList.add('status-dot--online');
      if (text) text.textContent = 'Connection restored — reloading…';
      if (btn)  btn.disabled = true;

      setTimeout(function () { window.location.reload(); }, 800);
    });

  }());
  </script>

</body>
</html>
