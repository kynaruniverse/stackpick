<!DOCTYPE html>
<html lang="en-GB" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>You're offline — StackPick</title>
  <style>
    :root {
      --bg: #0D1520;
      --text: #EEF2F7;
      --accent: #C82020;
      --border: #1C2C44;
      --font-display: 'Barlow Condensed', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
    }
    .icon { font-size: 4rem; margin-bottom: 1rem; }
    h1 { font-family: var(--font-display); font-size: 2.5rem; text-transform: uppercase; margin-bottom: 1rem; }
    p { color: #A8BCCF; max-width: 400px; line-height: 1.6; margin-bottom: 2rem; }
    .btn {
      background: var(--accent);
      color: white;
      padding: 1rem 2rem;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
      text-transform: uppercase;
      font-family: var(--font-display);
    }
    .cached-list { margin-top: 3rem; text-align: left; width: 100%; max-width: 400px; }
    .cached-list h2 { font-size: 0.8rem; text-transform: uppercase; color: #5A718E; margin-bottom: 1rem; }
    .cached-item { background: #111D2B; border: 1px solid var(--border); padding: 1rem; border-radius: 12px; margin-bottom: 0.5rem; display: block; text-decoration: none; color: inherit; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>You're Offline</h1>
  <p>No internet connection detected. Check your signal or browse your recently visited pages below.</p>
  <a href="/" class="btn">Try Again</a>
  <div class="cached-list">
    <h2>Available Offline</h2>
    <a href="/mice/" class="cached-item">🖱️ Best Gaming Mice</a>
    <a href="/keyboards/" class="cached-item">⌨️ Best Gaming Keyboards</a>
    <a href="/controllers/" class="cached-item">🎮 Best Gaming Controllers</a>
    <a href="/guides/" class="cached-item">📋 Setup Guides</a>
  </div>
</body>
</html>
